apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

namePrefix: dev-

commonLabels:
  env: dev

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=dashboard"

resources: []
  # Uncomment when charts/dashboard is added:
  # - ../../charts/dashboard/templates/deployment.yaml
  # - ../../charts/dashboard/templates/service.yaml
