minio:
  mode: distributed
  replicas: 4

  # Credentials injected from Vault/external-secrets — never stored in git
  existingSecret: minio-credentials

  persistence:
    enabled: true
    size: 100Gi
    storageClass: fast-ssd

  resources:
    requests:
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: 2000m

  consoleIngress:
    enabled: true
    ingressClassName: nginx
    hostname: minio-console.example.com
    tls: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod

  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: minio.example.com
    tls: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod

  metrics:
    serviceMonitor:
      enabled: true
