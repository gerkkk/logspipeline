apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

helmCharts:
- name: argo-cd
  repo: https://argoproj.github.io/argo-helm
  version: 7.7.0
  releaseName: argocd
  includeCRDs: true
  valuesFile: values.yaml

patches:
- path: patches/redis-patch.yaml
  target:
    kind: Deployment
    name: argocd-redis