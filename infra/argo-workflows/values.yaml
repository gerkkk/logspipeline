argo-workflows:
  workflow:
    serviceAccount:
      create: true
      name: argo-workflow
    rbac:
      create: true

  controller:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    metricsConfig:
      enabled: true
    workflowDefaults:
      spec:
        artifactRepositoryRef:
          configMap: artifact-repositories
          key: default-v1

  server:
    enabled: true
    serviceType: ClusterIP
    extraArgs:
      - --auth-mode=server
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    ingress:
      enabled: false

  executor:
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 512Mi

  useStatefulSetFiles: true

# Создаем ConfigMap для artifact repository
artifactRepositoryConfigMap:
  name: artifact-repositories
  data:
    default-v1: |
      s3:
        bucket: spark-logs
        endpoint: minio.minio.svc.cluster.local:9000
        insecure: true
        accessKeySecret:
          name: minio-credentials
          key: rootUser
        secretKeySecret:
          name: minio-credentials
          key: rootPassword
