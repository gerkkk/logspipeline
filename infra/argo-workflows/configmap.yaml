apiVersion: v1
kind: ConfigMap
metadata:
  name: artifact-repositories
  namespace: argo-workflows
data:
  default-v1: |
    s3:
      bucket: spark-logs
      endpoint: minio.minio.svc.cluster.local:9000
      insecure: true
      accessKeySecret:
        name: minio-credentials
        key: rootUser
      secretKeySecret:
        name: minio-credentials
        key: rootPassword
